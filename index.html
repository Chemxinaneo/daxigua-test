<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>钱妮狗狗的小游戏</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fcebc5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game-container { width: 400px; height: 700px; background-color: #fff; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.2); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #score-board { position: absolute; top: 15px; left: 15px; font-size: 24px; font-weight: bold; color: #333; z-index: 10; user-select: none; }
        
        #next-panel { position: absolute; top: 15px; right: 15px; text-align: right; font-weight: bold; color: #333; z-index: 10; }
        .next-item { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 8px; font-size: 14px; }
        .next-item img { border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.3); margin-left: 10px; object-fit: cover; background: #eee; }
        
        #death-line { position: absolute; top: 120px; left: 0; width: 100%; height: 2px; background-color: rgba(255, 0, 0, 0.2); z-index: 5; border-top: 2px dashed red; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; color: #666; z-index: 20; }
        
        #game-over-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 30; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #game-over-modal h1 { margin: 0 0 15px 0; font-size: 36px; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #game-over-modal p { font-size: 24px; margin: 0 0 30px 0; }
        #game-over-modal button { padding: 12px 30px; font-size: 20px; font-weight: bold; color: #fff; background: #ff69b4; border: 3px solid #fff; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s; }
        #game-over-modal button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">分数: <span id="score">0</span></div>
        
        <div id="next-panel" style="display: none;">
            <div class="next-item">下一个: <img id="next-img-1" src="" width="45" height="45"></div>
            <div class="next-item">下下次: <img id="next-img-2" src="" width="30" height="30"></div>
        </div>

        <div id="death-line"></div>
        <div id="loading">正在加载照片...</div>
        
        <div id="game-over-modal">
            <h1>游戏结束！</h1>
            <p>最终得分: <span id="final-score">0</span></p>
            <button onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const mergeSound = new Audio('merge.mp3');

        async function processCircularImage(imageSrc, radius) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = imageSrc;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = radius * 2;
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.beginPath();
                    ctx.arc(radius, radius, radius, 0, Math.PI * 2);
                    ctx.clip();
                    const scale = Math.max(size / img.width, size / img.height);
                    const drawWidth = img.width * scale;
                    const drawHeight = img.height * scale;
                    const x = (size - drawWidth) / 2;
                    const y = (size - drawHeight) / 2;
                    ctx.drawImage(img, x, y, drawWidth, drawHeight);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => resolve(null);
            });
        }

        const originalLevels = [
            { radius: 20, img: '0.png', color: '#ffb6c1' }, 
            { radius: 35, img: '1.png', color: '#ff69b4' },
            { radius: 55, img: '2.png', color: '#ff1493' },
            { radius: 75, img: '3.png', color: '#db7093' },
            { radius: 95, img: '4.png', color: '#c71585' },
            { radius: 115, img: '5.png', color: '#8a2be2' },
            { radius: 135, img: '6.png', color: '#4b0082' },
            { radius: 160, img: '7.png', color: '#006400' }
        ];

        let processedLevels = [];
        let isGameOver = false;
        let nextQueue = []; 

        function updateNextUI() {
            document.getElementById('next-img-1').src = processedLevels[nextQueue[0]].texture;
            document.getElementById('next-img-2').src = processedLevels[nextQueue[1]].texture;
        }

        async function initGame() {
            for (let i = 0; i < originalLevels.length; i++) {
                const config = originalLevels[i];
                const base64Img = await processCircularImage(config.img, config.radius);
                processedLevels.push({ radius: config.radius, color: config.color, texture: base64Img });
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('next-panel').style.display = 'block';

            nextQueue.push(Math.floor(Math.random() * 3));
            nextQueue.push(Math.floor(Math.random() * 3));
            updateNextUI();

            const Engine = Matter.Engine,
                  Render = Matter.Render,
                  Runner = Matter.Runner,
                  Bodies = Matter.Bodies,
                  Composite = Matter.Composite,
                  Events = Matter.Events;

            const engine = Engine.create();
            const width = 400;
            const height = 700;

            // 开启了抗锯齿和防模糊高清渲染
            const render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: { 
                    width: width, 
                    height: height, 
                    wireframes: false, 
                    background: 'transparent',
                    pixelRatio: window.devicePixelRatio || 1 // 高清修复魔法代码
                }
            });

            let score = 0;

            const wallOptions = { isStatic: true, render: { fillStyle: '#8b4513' } };
            const ground = Bodies.rectangle(width/2, height + 25, width, 50, wallOptions);
            const leftWall = Bodies.rectangle(-25, height/2, 50, height, wallOptions);
            const rightWall = Bodies.rectangle(width + 25, height/2, 50, height, wallOptions);
            Composite.add(engine.world, [ground, leftWall, rightWall]);

            function createFruit(x, y, levelIndex) {
                const config = processedLevels[levelIndex];
                return Bodies.circle(x, y, config.radius, {
                    restitution: 0.2,
                    friction: 0.3,
                    density: 0.001 * (levelIndex + 1), 
                    label: 'fruit_' + levelIndex,
                    render: {
                        fillStyle: config.color,
                        sprite: config.texture ? { texture: config.texture, xScale: 1, yScale: 1 } : undefined
                    }
                });
            }

            let canDrop = true;
            document.getElementById('game-container').addEventListener('pointerdown', function(e) {
                if (!canDrop || isGameOver) return;
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left; 
                const safeX = Math.max(30, Math.min(width - 30, x));
                
                const currentLevel = nextQueue.shift(); 
                Composite.add(engine.world, createFruit(safeX, 40, currentLevel));
                
                nextQueue.push(Math.floor(Math.random() * 3));
                updateNextUI();
                
                canDrop = false;
                setTimeout(() => { canDrop = true; }, 600);
            });

            Events.on(engine, 'collisionStart', function(event) {
                const pairs = event.pairs;
                for (let i = 0; i < pairs.length; i++) {
                    const bodyA = pairs[i].bodyA;
                    const bodyB = pairs[i].bodyB;

                    if (bodyA.label.startsWith('fruit_') && bodyA.label === bodyB.label) {
                        const level = parseInt(bodyA.label.split('_')[1]);
                        if (level >= processedLevels.length - 1) continue;

                        if (bodyA.isMerging || bodyB.isMerging) continue;
                        bodyA.isMerging = true;
                        bodyB.isMerging = true;

                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(engine.world, [bodyA, bodyB]);
                        Composite.add(engine.world, createFruit(midX, midY, level + 1));

                        mergeSound.currentTime = 0; 
                        mergeSound.play().catch(e => console.log("需用户先交互"));

                        score += (level + 1) * 2;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            let dangerFrames = 0;
            const deathLineY = 120; 
            
            Events.on(engine, 'afterUpdate', function() {
                if (isGameOver) return;
                
                let isDanger = false;
                const bodies = Composite.allBodies(engine.world);
                
                for (let i = 0; i < bodies.length; i++) {
                    const body = bodies[i];
                    if (body.label.startsWith('fruit_') && body.bounds.min.y < deathLineY) {
                        if (Math.abs(body.velocity.y) < 1.5 && Math.abs(body.velocity.x) < 1.5) {
                            isDanger = true;
                            break;
                        }
                    }
                }

                if (isDanger) {
                    dangerFrames++;
                    if (dangerFrames > 120) {
                        isGameOver = true;
                        document.getElementById('final-score').innerText = score;
                        document.getElementById('game-over-modal').style.display = 'flex';
                    }
                } else {
                    dangerFrames = 0;
                }
            });

            Render.run(render);
            Runner.run(Runner.create(), engine);
        }

        initGame();
    </script>
</body>
</html>
